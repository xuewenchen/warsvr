syntax = "proto3";

package pb;
option go_package = "cardwar/protocol/pb";

// ----- Room messages (Client ↔ RoomSvr) -----

message RoomJoinReq {
  string match_id = 1;
}

message RoomJoinResp {
  bool success = 1;
  string match_id = 2;
  string server_id = 3;
  string error = 4;
}

message RoomLeaveReq {
  string match_id = 1;
}

message RoomLeaveResp {
  bool success = 1;
  string error = 2;
}

// 房间内事件推送
message RoomEventPush {
  string match_id = 1;
  string player_id = 2;
  string event = 3;        // "joined" | "left"
  int64 player_count = 4;
}

// ----- RoomSvr → MatchSvr (internal, room destroyed notification) -----

message RoomDestroyedPush {
  string match_id = 1;
}