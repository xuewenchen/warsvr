syntax = "proto3";

package pb;
option go_package = "cardwar/protocol/pb";

// Message IDs for Zinx routing. All client-server messages are routed by these.
enum MsgID {
  MSG_ID_UNSPECIFIED = 0;
  PING = 1;
  PONG = 2;
  CHAT_REQ = 5;
  CHAT_RESP = 6;


  // 服务间身份交换
  SERVICE_IDENTITY = 1001;

  // ===== match pool
  MATCH_ENTER_REQ = 11;
  MATCH_ENTER_RESP = 12;
  MATCH_RESULT_PUSH = 13;

  // ===== match directory
  MATCH_ALLOCATE_REQ = 18;
  MATCH_ALLOCATE_RESP = 19;
  MATCH_QUERY_REQ = 20;
  MATCH_QUERY_RESP = 21;

  // ===== room
  ROOM_JOIN_REQ = 14;
  ROOM_JOIN_RESP = 15;
  ROOM_LEAVE_REQ = 16;
  ROOM_LEAVE_RESP = 17;

  ROOM_DESTROYED_PUSH = 22; // RoomSvr → MatchSvr (internal)
  ROOM_EVENT_PUSH = 23;     // RoomSvr → Client (joined/left broadcast)

  // ===== session (disconnect / reconnect)
  SESSION_SAVE = 1002;              // Gateway → SessionSvr: sync conn_tags
  SESSION_GET = 1003;               // Gateway → SessionSvr: query session
  SESSION_DISCONNECT = 1004;        // Gateway → SessionSvr: mark disconnected
  SESSION_RECONNECT = 1005;         // Gateway → SessionSvr: mark reconnected
  SESSION_FORCE_LEAVE = 1006;       // SessionSvr → RoomSvr: TTL expired, force leave room
  SESSION_FORCE_LEAVE_QUEUE = 1007; // SessionSvr → MatchSvr: TTL expired, force leave queue
  SESSION_RECONNECTED = 1008;       // Gateway → RoomSvr: player reconnected, update conn
}
