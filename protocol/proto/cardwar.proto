syntax = "proto3";

package pb;
option go_package = "cardwar/protocol/pb";

// ----- Client ↔ Gateway -----

message LoginReq {
  string player_id = 1;
}

message LoginRsp {
  string player_id = 1;
  bool   success   = 2;
  string message   = 3;
}

message ChatReq {
  string player_id = 1;
  string content   = 2;
}

message BroadcastPush {
  string player_id = 1;
  string content   = 2;
  int64  timestamp = 3;
}

// ----- Gateway ↔ ChatSvr (internal) -----

message Envelope {
  uint64 conn_id = 1;
  bytes  data    = 2;
}
