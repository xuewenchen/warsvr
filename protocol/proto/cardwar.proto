syntax = "proto3";

package pb;
option go_package = "cardwar/protocol/pb";

// ----- Client ↔ Gateway -----

message LoginReq {
  int64 player_id = 1;
}

message LoginRsp {
  int64 player_id = 1;
  bool  success   = 2;
  string message   = 3;
}

message ChatReq {
  string content = 1;
  int64 target_player_id = 2;  // 0 = global, non-zero = private target
}

message ChatResp {
  int64 sender_player_id = 1;
  string content = 2;
  int64 timestamp = 3;
  int64 target_player_id = 4;  // 0 = global, non-zero = private recipient
}

// ----- Gateway ↔ Backend (internal) -----

message Envelope {
  uint64 conn_id = 1;
  bytes  data    = 2;
  map<string, string> conn_tags = 3; // 附着在发包回包的额外数据
}
