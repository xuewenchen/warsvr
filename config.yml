services:
  gateway:
    - id: gw-1
      tcp_listen: 0.0.0.0:9000
      ws_listen: 0.0.0.0:9001
      public_addr: 127.0.0.1:9000

  chatsvr:
    - id: cs-1
      listen: 0.0.0.0:8001
      public_addr: 127.0.0.1:8001
    # - id: cs-2
    #   listen: 0.0.0.0:8002
    #   public_addr: 127.0.0.1:8002
  
gateway:
  jwt_secret: "change-me-in-production"
  routes:
    chatsvr:
      forward: [5]          # MsgIdChat
      route_key: playerId
      route_type: hash    # "hash" (default) or "random"
